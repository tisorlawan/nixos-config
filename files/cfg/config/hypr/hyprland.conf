monitor = , preferred, auto, 1

exec-once = systemctl --user start quickshell.service
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = mako
exec-once = copyq --start-server
exec-once = hyprsunset

$mainMod = SUPER
$terminal = kitty
$terminalAlt = $HOME/.scripts/my-alacritty
$menu = rofi -show drun

env = PATH,$HOME/.scripts:$HOME/.local/bin:$HOME/.nix-profile/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin
env = LANG,en_US.UTF-8
env = LC_ALL,en_US.UTF-8
env = LC_CTYPE,en_US.UTF-8
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:$HOME/.nix-profile/share:/nix/var/nix/profiles/default/share

input {
    kb_layout = us
    follow_mouse = 0
    repeat_delay = 350
    repeat_rate = 130

    touchpad {
        natural_scroll = false
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
    col.active_border = rgba(7aa2f7ff)
    col.inactive_border = rgba(00000000)
}

decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

cursor {
    inactive_timeout = 3
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    focus_on_activate = true
}

xwayland {
    force_zero_scaling = true
}

bind = SUPER SHIFT, R, exec, hyprctl reload
bind = $mainMod, Return, exec, $HOME/.scripts/kitty-titled
bind = $mainMod SHIFT, Return, exec, $terminal
bind = $mainMod, Space, exec, $menu
bind = $mainMod SHIFT, Space, exec, rofi -config $HOME/.config/rofi/config.rasi -show run -modi run,drun
bind = ALT, 9, exec, $HOME/.scripts/hypr-switch-title
bind = $mainMod SHIFT, C, killactive
bind = $mainMod SHIFT, M, exit
bind = $mainMod, M, exec, $HOME/.scripts/hypr-toggle-layout
bind = $mainMod, F, fullscreen
bind = $mainMod CTRL, F, fullscreenstate, 2 0
bind = $mainMod SHIFT, F, exec, sh -c 'state="$($HOME/.scripts/quickshell-bar-toggle toggle)"; if [ "$state" = hidden ]; then "$HOME/.scripts/quickshell-clock-toggle" show; else "$HOME/.scripts/quickshell-clock-toggle" hide; fi'
bind = $mainMod SHIFT, T, exec, $HOME/.scripts/quickshell-clock-toggle toggle
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod CTRL, P, exec, $HOME/.cargo/bin/passlock -- $HOME/.rice/passlock.enc
bind = $mainMod, O, togglesplit

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, exec, $HOME/.scripts/hypr-cycle next
bind = $mainMod, K, exec, $HOME/.scripts/hypr-cycle prev
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, L, swapwindow, r

bind = $mainMod, bracketleft, workspace, m-1
bind = $mainMod, bracketright, workspace, m+1
bind = $mainMod, Tab, workspace, previous

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, Q, workspace, 4
bind = $mainMod, W, workspace, 5
bind = $mainMod, E, workspace, 6
bind = $mainMod, A, workspace, 7
bind = $mainMod, S, workspace, 8
bind = $mainMod, D, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, Q, movetoworkspacesilent, 4
bind = $mainMod SHIFT, W, movetoworkspacesilent, 5
bind = $mainMod SHIFT, E, movetoworkspacesilent, 6
bind = $mainMod SHIFT, A, movetoworkspacesilent, 7
bind = $mainMod SHIFT, S, movetoworkspacesilent, 8
bind = $mainMod SHIFT, D, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, grave, cyclenext
bind = $mainMod SHIFT, grave, cyclenext, prev

binde = $mainMod ALT, H, resizeactive, -20 0
binde = $mainMod ALT, J, resizeactive, 0 20
binde = $mainMod ALT, K, resizeactive, 0 -20
binde = $mainMod ALT, L, resizeactive, 20 0

bind = $mainMod, Left, moveactive, -20 0
bind = $mainMod, Down, moveactive, 0 20
bind = $mainMod, Up, moveactive, 0 -20
bind = $mainMod, Right, moveactive, 20 0

binde = $mainMod SHIFT, Left, resizeactive, -50 0
binde = $mainMod SHIFT, Down, resizeactive, 0 50
binde = $mainMod SHIFT, Up, resizeactive, 0 -50
binde = $mainMod SHIFT, Right, resizeactive, 50 0

bind = $mainMod SHIFT, 9, exec, $HOME/.scripts/lock
bind = $mainMod, 7, exec, $HOME/.scripts/killrecording
bind = $mainMod, 5, exec, $HOME/.scripts/toggle-redshift
bind = $mainMod, 8, exec, copyq toggle
bind = $mainMod, Y, exec, makoctl dismiss -a

bind = , Print, exec, $HOME/.scripts/screenshot-area
bind = ALT, Print, exec, $HOME/.scripts/screenshot-full

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow
bindm = $mainMod, mouse:273, resizewindow

workspace = 1, layout:monocle
workspace = w[tv1], border:false
workspace = f[1], border:false

windowrule = float on, match:class ^(pavucontrol)$
windowrule = move cursor -100% 0, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = move cursor -100% 0, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(com\.github\.hluk\.copyq)$
windowrule = move center, match:class ^(com\.github\.hluk\.copyq)$
windowrule = size 800 600, match:class ^(com\.github\.hluk\.copyq)$
windowrule = float on, match:modal on
windowrule = move center, match:modal on
windowrule = float on, match:title ^(Passlock)$
windowrule = move center, match:title ^(Passlock)$
windowrule = float on, match:class ^(sdl3-explore)$
windowrule = move center, match:class ^(sdl3-explore)$
windowrule = size 500 500, match:class ^(sdl3-explore)$

windowrule = float on, match:title ^(lancelot)$
windowrule = move center, match:title ^(lancelot)$

windowrule = float on, match:class ^(cliccy)$
windowrule = move center, match:class ^(cliccy)$

windowrule = workspace 6 follow, match:class ^(sioyek)$

# Browser notification popups
windowrule = float on, match:title ^(mail\.google\.com)$
windowrule = float on, match:title ^(chat\.google\.com)$

windowrule = float on, match:class ^(mdv)$

# File save/open dialogs (xdg-desktop-portal-gtk, native GTK file chooser)
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = size 1000 650, match:class ^(xdg-desktop-portal-gtk)$
windowrule = move center, match:class ^(xdg-desktop-portal-gtk)$
windowrule = rounding 12, match:class ^(xdg-desktop-portal-gtk)$

windowrule = float on, match:title ^(Open File)$
windowrule = size 1000 650, match:title ^(Open File)$
windowrule = move center, match:title ^(Open File)$
windowrule = rounding 12, match:title ^(Open File)$

windowrule = float on, match:title ^(Save File)$
windowrule = size 1000 650, match:title ^(Save File)$
windowrule = move center, match:title ^(Save File)$
windowrule = rounding 12, match:title ^(Save File)$

windowrule = float on, match:title ^(Save As)$
windowrule = size 1000 650, match:title ^(Save As)$
windowrule = move center, match:title ^(Save As)$
windowrule = rounding 12, match:title ^(Save As)$

windowrule = float on, match:title ^(All Files)$
windowrule = move center, match:title ^(All Files)$

# LibreOffice dialogs (Wayland sometimes drops modal flag)
windowrule = float on, match:title ^(Text Import.*)$
windowrule = size 900 650, match:title ^(Text Import.*)$
windowrule = move center, match:title ^(Text Import.*)$
